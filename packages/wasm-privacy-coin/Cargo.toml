[package]
name = "wasm-privacy-coin"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Core tree crates — pinned to exact versions for deterministic builds.
shardtree = "=0.6.2"
incrementalmerkletree = "=0.8.2"
orchard = { version = "=0.14.0", default-features = false }

# Protobuf encode/decode for the Java↔WASM wire format.
prost = { version = "0.13", default-features = false, features = ["prost-derive"] }

# serde + serde_json: used for the persistence wire format (PersistedShardTreeState JSON).
# The Java↔WASM boundary uses protobuf, but save()/from_state() serialise the in-memory
# shardtree to JSON so it can survive JVM restarts.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# hex: used to encode/decode MerkleHashOrchard bytes in the serialised shard/cap nodes.
hex = "0.4"

[build-dependencies]
prost-build = "0.13"
protoc-bin-vendored = "3"

[profile.release]
opt-level = 3
lto = true
strip = true
