[package]
name = "wasm-ton"
version = "0.1.0"
edition = "2021"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
crate-type = ["cdylib", "rlib"]

[lints.clippy]
all = "warn"

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"
# WASM random number generation support
getrandom = { version = "0.2", features = ["js"] }
# TON crates (toner ecosystem v0.7)
tlb = { version = "0.7", default-features = false, features = ["sha2"] }
tlbits = "0.7"
tlb-ton = { version = "0.7", default-features = false, features = ["sha2"] }
ton-contracts = { version = "0.7", default-features = false, features = ["wallet", "jetton"] }
# BigUint for monetary amounts (re-exported by tlbits but not publicly)
num-bigint = "0.4"
# DateTime for expire_at in V4R2 sign body
chrono = { version = "0.4", default-features = false, features = ["std"] }
# Base64 encoding/decoding for BOC serialization
base64 = "0.22"
# Hex encoding for signatures/keys
hex = "0.4"

[dev-dependencies]
wasm-bindgen-test = "0.3"
hex = "0.4"

[profile.release]
strip = true
