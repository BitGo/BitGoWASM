[package]
name = "wasm-ton"
version = "0.1.0"
edition = "2021"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
crate-type = ["cdylib", "rlib"]

[lints.clippy]
all = "warn"

[dependencies]
# WASM bindings
wasm-bindgen = "0.2"
js-sys = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"

# TON crates (toner ecosystem)
tlb = { version = "0.7.3", default-features = false, features = ["sha2"] }
tlb-ton = { version = "0.7.3", default-features = false }
ton-contracts = { version = "0.7.3", default-features = false, features = ["jetton", "wallet"] }

# WASM random number generation support
getrandom = { version = "0.2", features = ["js"] }

# BigUint for TON monetary amounts (Grams)
num-bigint = "0.4"

# DateTime for V4R2 expire_at
chrono = { version = "0.4", default-features = false, features = ["std"] }

# Bit-level operations for cell building
bitvec = "1"

# Encoding
hex = "0.4"
base64 = "0.22"

[dev-dependencies]
wasm-bindgen-test = "0.3"
hex = "0.4"

[profile.release]
strip = true
