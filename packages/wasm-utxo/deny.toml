[advisories]
# core2 is unmaintained (RUSTSEC-2026-0105) but no safe upgrade is available;
# it's a transitive dependency of zcash crates (zcash_encoding, zcash_primitives, zebra-chain).
ignore = [{ id = "RUSTSEC-2026-0105" }]

# Deny multiple versions of dependencies
[bans]
multiple-versions = "deny"
# Highlight bech32 specifically (ensures it's caught if duplicated)
highlight = "all"
# Skip hex-conservative duplicate (miniscript uses 1.0.1 directly, bitcoin uses 0.2.2 via bitcoin_hashes)
skip = [{ crate = "hex-conservative@0.2.2" }]

# Allow git sources (needed for miniscript)
[sources]
allow-git = ["https://github.com/BitGo/rust-miniscript"]

# Allow common licenses used in the Rust ecosystem
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "CC0-1.0",
    "MITNFA",
    "Unicode-3.0",
    "BSD-3-Clause",
    "Unlicense",
]
# Clarify license for unlicensed crate
[[licenses.clarify]]
name = "wasm-utxo"
expression = "MIT OR Apache-2.0"
license-files = []
