[package]
name = "wasm-mps"
version = "0.1.0"
edition = "2021"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
crate-type = ["cdylib"]

[lints.clippy]
all = "warn"

[dependencies]
bincode = "1.3"
crypto_box = "0.9"
getrandom = { version = "0.2", features = ["js"] }
js-sys = "0.3"
multi-party-schnorr = { version = "1.3.0-pre.5", features = ["serde", "eddsa", "redpallas"] }
orchard = { version = "0.13", default-features = false }
pasta_curves = { version = "0.5", default-features = false }
zcash = { git = "ssh://git@github.com/silence-laboratories/garbling", rev = "b18fb707", features = ["dkg"] }
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0.18"
wasm-bindgen = "0.2"
web-sys = "0.3"

[dev-dependencies]
ed25519-dalek = "2.1.0"

[profile.release]
strip = true
lto = "fat"
codegen-units = 1

[patch.crates-io]
orchard = { git = "https://github.com/zcash/orchard", tag = "0.13.1" }