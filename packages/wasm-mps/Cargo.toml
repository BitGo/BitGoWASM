[package]
name = "wasm-mps"
version = "0.1.0"
edition = "2021"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
crate-type = ["cdylib"]

[lints.clippy]
all = "warn"

[dependencies]
bincode = { package = "bincode-next", version = "3.1.1", features = ["serde"] }
crypto_box = "0.9"
getrandom = { version = "0.2", features = ["js"] }
js-sys = "0.3"
multi-party-schnorr = { version = "1.3.0-pre.6", features = ["serde"]}
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0.18"
wasm-bindgen = "0.2"
web-sys = "0.3"

[dev-dependencies]
ed25519-dalek = "2.1.0"

[profile.release]
strip = true

