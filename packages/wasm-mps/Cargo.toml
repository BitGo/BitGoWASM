[package]
name = "wasm-mps"
version = "0.1.0"
edition = "2021"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
crate-type = ["cdylib"]

[lints.clippy]
all = "warn"

[dependencies]
bincode = "1.3"
crypto_box = "0.9"
getrandom = { version = "0.2", features = ["js"] }
js-sys = "0.3"
multi-party-schnorr = { git = "https://github.com/silence-laboratories/multi-party-schnorr.git", rev = "7511971e757a2260afa797283cf239c9cdfd5f19", features = ["serde"]}
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0.18"
wasm-bindgen = "0.2"
web-sys = "0.3"

[dev-dependencies]
ed25519-dalek = "2.1.0"

[profile.release]
strip = true

