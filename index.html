<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="X-UA-Compatible" content="ie=edge"><title>BitGoWASM Demos</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><style>:root {
      /* Dark theme - GitHub-inspired */
      --bg: #0d1117;
      --fg: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --surface: #161b22;
      --surface-hover: #1c2128;
      --border: #30363d;
      --border-subtle: #21262d;
      --error: #f85149;
      --success: #3fb950;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', Consolas, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    body {
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Selection styling */
    ::selection {
      background: var(--accent);
      color: var(--bg);
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    /* Focus visible styling for accessibility */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Loading state */
    #app:empty::before {
      content: 'Loading...';
      display: block;
      text-align: center;
      padding: 4rem;
      color: var(--muted);
    }</style><script defer="defer" src="bundle.js"></script></head><body><div id="app"></div></body></html>
