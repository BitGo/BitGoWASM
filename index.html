<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="X-UA-Compatible" content="ie=edge"><title>BitGoWASM Demos</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><style>:root {
      /* BitGo Brand Colors */
      /* Primary */
      --brand-blue: #1647DB;
      --brand-blue-shade1: #0F3199;
      --brand-blue-shade2: #121E5C;
      --brand-off-black: #0E0F0F;
      --brand-white: #FFFFFF;
      --brand-gold: #CFAC53;
      --brand-gold-shade1: #B78A31;
      --brand-gold-shade2: #3C2F19;

      /* Grays */
      --gray-5: #2E2E2E;
      --gray-4: #595959;
      --gray-3: #969696;
      --gray-2: #D9D9D9;
      --gray-1: #F2F2F2;

      /* Secondary Colors */
      --sky-blue: #62ABF4;
      --sky-blue-tint1: #B6D8FF;
      --sky-blue-tint2: #DFE8F2;
      --purple: #594DFF;
      --lavender: #8780FF;
      --teal: #2E9987;
      --green: #7ACC8F;
      --red: #D13B54;
      --orange: #FF704C;
      --yellow: #EBC55E;

      /* Theme mapping (dark mode) */
      --bg: var(--brand-off-black);
      --fg: var(--gray-1);
      --muted: var(--gray-3);
      --accent: var(--sky-blue);
      --accent-hover: var(--sky-blue-tint1);
      --surface: var(--gray-5);
      --surface-hover: var(--gray-4);
      --border: var(--gray-4);
      --border-subtle: var(--gray-5);
      --error: var(--red);
      --success: var(--green);
      --warning: var(--brand-gold);

      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', Consolas, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    body {
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      padding: 2rem;
    }

    /* Selection styling */
    ::selection {
      background: var(--accent);
      color: var(--bg);
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    /* Focus visible styling for accessibility */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Loading state */
    #app:empty::before {
      content: 'Loading...';
      display: block;
      text-align: center;
      padding: 4rem;
      color: var(--muted);
    }</style><script defer="defer" src="bundle.js"></script></head><body><div id="app"></div></body></html>
